<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クシロAIナビ</title>
<style>
body{font-family:sans-serif;background:#eef3ff;margin:0;}
header{background:#4a6cf7;color:white;text-align:center;padding:18px;font-size:20px;}
.card{background:white;margin:12px;padding:15px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
button{width:100%;padding:12px;margin-top:8px;background:#4a6cf7;color:white;border:none;border-radius:10px;font-size:15px;}
.kiri{background:#fff8dc;}
</style>
</head>
<body>

<header>🗺 クシロAIナビ</header>

<div class="card">
  <h2>🏠 ホーム</h2>
  <p>釧路の自然・夕日・グルメを楽しむ観光アプリです。</p>
</div>

<div class="card kiri">
  <h2>🐻 キリ君</h2>
  <p id="kiriText">こんにちは！クシロの旅を案内するよ。</p>
  <button onclick="kiriTalk()">キリ君に聞く</button>
</div>

<div class="card">
  <h2>🌟 今日のおすすめ</h2>
  <p id="recommend">ボタンを押すとおすすめが出ます。</p>
  <button onclick="todayRecommend()">今日のおすすめを見る</button>
</div>

<div class="card">
  <h2>🌿 観光スポット</h2>
  <button onclick="openMap('釧路湿原')">釧路湿原</button>
  <button onclick="openMap('幣舞橋')">幣舞橋</button>
  <button onclick="openMap('釧路港')">釧路港</button>
</div>

<div class="card">
  <h2>🍣 グルメ</h2>
  <button onclick="openMap('和商市場')">和商市場・勝手丼</button>
  <button onclick="openMap('釧路 炉端焼き')">炉端焼き</button>
</div>

<div class="card">
  <h2>🗺 Googleマップ</h2>
  <button onclick="openRoute()">おすすめルートを開く</button>
</div>

<script>
function openMap(place){
  window.open(
    "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(place),
    "_blank"
  );
}

function openRoute(){
  window.open(
    "https://www.google.com/maps/dir/釧路湿原/和商市場/幣舞橋/釧路 炉端焼き",
    "_blank"
  );
}

function kiriTalk(){
  const messages = [
    "湿原は朝がおすすめだよ。",
    "夕方は幣舞橋の夕日を見てほしいな。",
    "夜は炉端焼きで釧路らしい時間を楽しもう。",
    "和商市場では勝手丼が人気だよ。"
  ];
  const text = messages[Math.floor(Math.random()*messages.length)];
  document.getElementById("kiriText").innerText = text;
}

function todayRecommend(){
  const list = [
    "🌿 釧路湿原で自然を感じる",
    "🌉 幣舞橋で夕日を見る",
    "🍣 和商市場で勝手丼を楽しむ",
    "🔥 夜は炉端焼きがおすすめ"
  ];
  const text = list[Math.floor(Math.random()*list.length)];
  document.getElementById("recommend").innerText = text;
}
</script>

</body>
</html>
