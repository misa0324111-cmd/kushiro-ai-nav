<div class="card">
<h2>🐻 キリ君チャット</h2>

<p id="chatBox">
キリ君：何を知りたい？
</p>

<button onclick="chatKiri('グルメ')">🍣 グルメ</button>
<button onclick="chatKiri('絶景')">🌉 絶景</button>
<button onclick="chatKiri('雨の日')">🌧 雨の日</button>
<button onclick="chatKiri('ルート')">🗺 ルート</button>
</div>

<script>
function chatKiri(type){

let answer = "";

if(type === "グルメ"){
answer = "キリ君：グルメなら和商市場の勝手丼と、夜の炉端焼きがおすすめだよ。";
}

if(type === "絶景"){
answer = "キリ君：絶景なら幣舞橋の夕日と釧路湿原が最高だよ。";
}

if(type === "雨の日"){
answer = "キリ君：雨の日は和商市場、カフェ、炉端焼きでゆっくり楽しもう。";
}

if(type === "ルート"){
answer = "キリ君：おすすめは、釧路湿原 → 和商市場 → 幣舞橋 → 炉端焼きだよ。";
}

document.getElementById("chatBox").innerText = answer;

}
</script>
