<div class="card">
<h2>📍 GPS現在地</h2>

<p id="gpsText">
現在地を取得して、近くの観光地を探します。
</p>

<button onclick="getGPS()">
📍 現在地を取得
</button>
</div>

<script>
function getGPS(){

  if(!navigator.geolocation){
    document.getElementById("gpsText").innerText =
    "この端末ではGPSが使えません。";
    return;
  }

  document.getElementById("gpsText").innerText =
  "現在地を取得中です...";

  navigator.geolocation.getCurrentPosition(
    function(position){

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      document.getElementById("gpsText").innerText =
      "現在地を取得しました。近くの観光地を開けます。";

      const url =
      "https://www.google.com/maps/search/釧路 観光地/@" +
      lat + "," + lng + ",14z";

      window.open(url, "_blank");
    },
    function(){
      document.getElementById("gpsText").innerText =
      "現在地を取得できませんでした。位置情報を許可してください。";
    }
  );
}
</script>
