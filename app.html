<div class="card">
<h2>🎯 釧路スタンプラリー</h2>

<p id="stampResult">まだスタンプはありません。</p>

<button onclick="getStamp('釧路湿原')">🌿 釧路湿原スタンプ</button>
<button onclick="getStamp('幣舞橋')">🌉 幣舞橋スタンプ</button>
<button onclick="getStamp('和商市場')">🍣 和商市場スタンプ</button>
<button onclick="getStamp('炉端焼き')">🔥 炉端焼きスタンプ</button>
<button onclick="getStamp('釧路駅')">🚉 釧路駅スタンプ</button>
<button onclick="getStamp('釧路空港')">✈️ 釧路空港スタンプ</button>
</div>

<script>
let stamps = [];

function getStamp(place){

  if(!stamps.includes(place)){
    stamps.push(place);
  }

  let html = "<h3>集めたスタンプ</h3>";

  stamps.forEach(function(s){
    html += "<p>✅ " + s + "</p>";
  });

  if(stamps.length >= 6){
    html += "<h3>🎉 クシロマスター達成！</h3>";
  }

  document.getElementById("stampResult").innerHTML = html;
}
</script>
