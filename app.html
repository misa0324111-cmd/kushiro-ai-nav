<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クシロAIナビ</title>

<style>
  font-family:sans-serif;
  margin:0;
  padding-bottom:80px;
  background:#eef3ff;
  color:#1f2937;
}

header{
  background:linear-gradient(135deg,#2563eb,#38bdf8);
  color:white;
  text-align:center;
  padding:24px 16px;
  font-size:24px;
  font-weight:bold;
  border-bottom-left-radius:24px;
  border-bottom-right-radius:24px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);
}

.card{
  background:white;
  margin:14px;
  padding:16px;
  border-radius:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.card h2{
  margin-top:0;
}

button{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb,#38bdf8);
  color:white;
  font-size:15px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(37,99,235,.25);
}

button:active{
  transform:scale(.98);
}

.kiri-fixed{
  position:fixed;
  right:16px;
  bottom:86px;
  background:#fff8dc;
  padding:14px;
  border-radius:50%;
  font-size:36px;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  z-index:999;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -3px 16px rgba(0,0,0,.12);
  font-size:12px;
}

.bottom-nav div{
  text-align:center;
  color:#2563eb;
  font-weight:bold;
}

img{
  width:100%;
  border-radius:18px;
  margin-top:10px;
}
